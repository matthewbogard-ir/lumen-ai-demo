server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Main pages
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SDK files
    location /sdk/ {
        alias /usr/share/nginx/html/sdk/;
    }

    # Scraped content and images
    location /content/ {
        alias /usr/share/nginx/html/content/;
    }

    # Proxy scraper API
    location /api/scraper/ {
        proxy_pass http://nike-scraper:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy content API
    location /api/content {
        proxy_pass http://nike-scraper:8002/content;
        proxy_set_header Host $host;
    }

    location /api/products {
        proxy_pass http://nike-scraper:8002/products;
        proxy_set_header Host $host;
    }
}
